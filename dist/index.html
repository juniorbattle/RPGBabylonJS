<!doctype html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><link rel="stylesheet" href="ui-styles.css"><title>GPA Tactics — Babylon.js</title><style>* { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0c10;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none; 
    }

    /* Loading overlay */
    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #0a0c10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loadingTitle {
      color: #7caaff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #loadingSubtitle {
      color: #556;
      font-size: 13px;
      letter-spacing: 2px;
    }
    .loader-bar {
      width: 200px;
      height: 3px;
      background: #1a1d24;
      border-radius: 2px;
      margin: 16px 0 8px;
      overflow: hidden;
    }
    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #3a6fff, #7caaff);
      border-radius: 2px;
      animation: loadPulse 1.5s ease-in-out infinite;
    }
    @keyframes loadPulse {
      0%   { width: 0%;   opacity: 1; }
      60%  { width: 90%;  opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }</style><script defer="defer" src="/bundle.js"></script></head><body><div id="loadingScreen"><div id="loadingTitle">GPA Tactics</div><div class="loader-bar"><div class="loader-fill"></div></div><div id="loadingSubtitle">Initialisation du moteur...</div></div><canvas id="renderCanvas"></canvas><div id="ui-overlay-root"><div class="tactics-grid-bg"></div><div class="tactics-vignette"></div></div></body></html>
